name: Publish Docker Hub image on OpenCode release

on:
  # GitHub Actions cannot directly subscribe to release events from another repository,
  # so this workflow polls the upstream repository on a schedule.
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: publish-dockerhub-on-opencode-release
  cancel-in-progress: false

env:
  IMAGE_NAME: felixdock/open-docker-nest
  UPSTREAM_OWNER: anomalyco
  UPSTREAM_REPO: opencode

jobs:
  publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve latest OpenCode release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getLatestRelease({
              owner: process.env.UPSTREAM_OWNER,
              repo: process.env.UPSTREAM_REPO,
            });

            const rawTag = String(data.tag_name);
            const version = rawTag.replace(/^v/, "");

            if (!/^[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z._-]+)?$/.test(version)) {
              core.setFailed(`Unsupported upstream release tag format: ${rawTag}`);
              return;
            }

            core.notice(`Latest upstream release tag: ${rawTag}`);
            core.notice(`Docker image tag / OPENCODE_VERSION: ${version}`);

            core.setOutput("raw_tag", rawTag);
            core.setOutput("version", version);

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Decide whether a rebuild is needed
        id: decision
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          if docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}" >/dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "reason=version-tag-already-exists" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=version-tag-missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Point latest tag at the existing version image
        if: steps.decision.outputs.should_build != 'true'
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${VERSION}"

      - name: Resolve pinned tool versions for rebuild
        if: steps.decision.outputs.should_build == 'true'
        id: tool_versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_VERSION: ${{ steps.release.outputs.version }}
          OUTPUT_JSON_PATH: ${{ runner.temp }}/docker-build-versions.json
          OUTPUT_BUILD_ARGS_PATH: ${{ runner.temp }}/docker-build-args.txt
        run: |
          set -euo pipefail
          node .github/scripts/resolve-docker-build-versions.mjs

      - name: Upload resolved version pins
        if: steps.decision.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-versions-${{ steps.release.outputs.version }}
          path: |
            ${{ runner.temp }}/docker-build-versions.json
            ${{ runner.temp }}/docker-build-args.txt

      - name: Build and push Docker image
        if: steps.decision.outputs.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64
          build-args: ${{ steps.tool_versions.outputs.build_args }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=open-docker-nest
            org.opencontainers.image.description=Run OpenCode inside Docker with host-project parity and non-root ownership
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.open-docker-nest.opencode.version=${{ steps.release.outputs.version }}
            io.open-docker-nest.cache-ctrl.version=${{ steps.tool_versions.outputs.cache_ctrl_version }}
            io.open-docker-nest.bun.version=${{ steps.tool_versions.outputs.bun_version }}
            io.open-docker-nest.playwright.version=${{ steps.tool_versions.outputs.playwright_version }}
            io.open-docker-nest.java21.version=${{ steps.tool_versions.outputs.java21_version }}
            io.open-docker-nest.java25.version=${{ steps.tool_versions.outputs.java25_version }}
            io.open-docker-nest.rust.toolchain.version=${{ steps.tool_versions.outputs.rust_toolchain_version }}
            io.open-docker-nest.rustup.version=${{ steps.tool_versions.outputs.rustup_version }}
            io.open-docker-nest.docker-cli.version=${{ steps.tool_versions.outputs.docker_cli_version }}
            io.open-docker-nest.docker-buildx.version=${{ steps.tool_versions.outputs.docker_buildx_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Write job summary
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.release.outputs.version }}
          SHOULD_BUILD: ${{ steps.decision.outputs.should_build }}
          REASON: ${{ steps.decision.outputs.reason }}
          CACHE_CTRL_VERSION: ${{ steps.tool_versions.outputs.cache_ctrl_version }}
          BUN_VERSION: ${{ steps.tool_versions.outputs.bun_version }}
          PLAYWRIGHT_VERSION: ${{ steps.tool_versions.outputs.playwright_version }}
          JAVA21_VERSION: ${{ steps.tool_versions.outputs.java21_version }}
          JAVA25_VERSION: ${{ steps.tool_versions.outputs.java25_version }}
          RUST_TOOLCHAIN_VERSION: ${{ steps.tool_versions.outputs.rust_toolchain_version }}
          RUSTUP_VERSION: ${{ steps.tool_versions.outputs.rustup_version }}
          DOCKER_CLI_VERSION: ${{ steps.tool_versions.outputs.docker_cli_version }}
          DOCKER_BUILDX_VERSION: ${{ steps.tool_versions.outputs.docker_buildx_version }}
        run: |
          {
            echo "## Docker publish summary"
            echo ""
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- OpenCode version: \`${VERSION}\`"
            echo "- Rebuilt image: \`${SHOULD_BUILD}\`"
            echo "- Decision reason: \`${REASON}\`"
            if [ "${SHOULD_BUILD}" = "true" ]; then
              echo ""
              echo "Resolved tool versions:"
              echo "- cache-ctrl: \`${CACHE_CTRL_VERSION}\`"
              echo "- bun: \`${BUN_VERSION}\`"
              echo "- playwright: \`${PLAYWRIGHT_VERSION}\`"
              echo "- Java 21: \`${JAVA21_VERSION}\`"
              echo "- Java 25: \`${JAVA25_VERSION}\`"
              echo "- Rust toolchain: \`${RUST_TOOLCHAIN_VERSION}\`"
              echo "- rustup: \`${RUSTUP_VERSION}\`"
              echo "- Docker CLI: \`${DOCKER_CLI_VERSION}\`"
              echo "- Docker Buildx: \`${DOCKER_BUILDX_VERSION}\`"
            fi
            echo ""
            echo "Published tags:"
            echo "- \`${IMAGE_NAME}:${VERSION}\`"
            echo "- \`${IMAGE_NAME}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
